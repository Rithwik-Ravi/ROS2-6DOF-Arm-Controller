<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robot Calligraphy</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        
        <!-- Header Controls -->
        <div class="header-controls glass-panel">
            <div class="control-row">
                <label>Text:</label>
                <input type="text" id="textInput" value="HELLO ROS2" class="wide-input">
                <label>Letter Size (mm):</label>
                <input type="number" id="letterSizeInput" value="25.0" step="1.0" class="num-input">
                <button id="generateTextBtn" class="primary-btn">Generate Preview</button>
            </div>
            
            <div class="control-row execution-row">
                <button id="executeBtn" class="execute-btn">EXECUTE</button>
                <button id="stopBtn" class="stop-btn">STOP</button>
                <div id="statusLabel" class="status-badge">Ready</div>
            </div>
            
            <div class="control-row">
                <label>Upload Image:</label>
                <input type="file" id="imageInput" accept="image/png, image/jpeg" class="file-input">
                <label>Detail Level:</label>
                <input type="range" id="detailLevelInput" min="1" max="100" value="20" class="range-input">
                <button id="generateImageBtn" class="secondary-btn">Vectorize Image</button>
            </div>
        </div>

        <!-- Dual Canvas Area -->
        <div class="workspace">
            <div class="canvas-wrapper glass-panel">
                <div class="canvas-title">Source Input</div>
                <div class="canvas-inner">
                    <canvas id="leftCanvas" width="500" height="500"></canvas>
                </div>
            </div>
            
            <div class="canvas-wrapper glass-panel">
                <div class="canvas-title">Physical Working Area (200x200mm)</div>
                <div class="canvas-inner right-inner">
                    <canvas id="rightCanvas" width="500" height="500"></canvas>
                </div>
            </div>
        </div>

    </div>
    
    <script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
